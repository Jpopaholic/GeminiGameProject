<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Stream Overlay - Cyber Glow Logo</title>
    <style>
        /* Google Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+TC:wght@300;400;700&display=swap');

        :root {
            --gemini-cyan: #8ab4f8;
            --gemini-blue: #4285f4;
            --gemini-purple: #a142f4;
            --gemini-magenta: #e066ff;
            --gemini-glow: 0 0 30px rgba(138, 180, 248, 0.4);
            --speaking-glow: 0 0 60px rgba(224, 102, 255, 0.8), 0 0 100px rgba(66, 133, 244, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: transparent;
            color: #ffffff;
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* 頂層容器 */
        .overlay-container {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 500px;
            height: 500px;
            user-select: none;
        }

        /* 背景畫布 - 粒子效果 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Logo 容器 */
        .logo-wrapper {
            position: relative;
            z-index: 10;
            width: 180px;
            height: 180px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 呼吸動畫 - 空閒狀態 */
        .logo-breathing {
            animation: breathe 4s ease-in-out infinite;
        }

        /* Gemini Logo SVG 樣式 */
        .gemini-logo-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(var(--gemini-glow));
            transition: filter 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 說話時亮起狀態 */
        .speaking .gemini-logo-svg {
            filter: drop-shadow(var(--speaking-glow));
            animation: pulse-speaking 1.2s ease-in-out infinite alternate;
        }

        .speaking .logo-wrapper {
            transform: scale(1.15) rotate(5deg);
        }

        /* 外圍科幻光環環圈 */
        .halo {
            position: absolute;
            width: 240px;
            height: 240px;
            border: 2px dashed rgba(138, 180, 248, 0.15);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transition: all 0.5s ease;
            animation: rotate-clockwise 25s linear infinite;
        }

        .speaking .halo {
            border: 2px dashed rgba(224, 102, 255, 0.4);
            box-shadow: inset 0 0 20px rgba(224, 102, 255, 0.1), 0 0 20px rgba(66, 133, 244, 0.1);
            animation: rotate-clockwise 10s linear infinite;
            width: 260px;
            height: 260px;
        }

        .speaking .halo-inner {
            border: 1px solid rgba(138, 180, 248, 0.3);
            width: 220px;
            height: 220px;
            animation: rotate-counter 6s linear infinite;
        }

        .halo-inner {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(138, 180, 248, 0.05);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transition: all 0.5s ease;
            animation: rotate-counter 15s linear infinite;
        }

        /* 字幕/對話框 (Glassmorphism) */
        .subtitle-box {
            position: absolute;
            bottom: 20px;
            width: 85%;
            max-width: 420px;
            background: rgba(10, 12, 22, 0.65);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 16px 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            z-index: 100;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .subtitle-box.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            border: 1px solid rgba(138, 180, 248, 0.25);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        0 0 20px rgba(138, 180, 248, 0.1),
                        inset 0 1px 1px rgba(255, 255, 255, 0.15);
        }

        .speaker-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gemini-cyan);
            font-weight: 800;
            text-shadow: 0 0 8px rgba(138, 180, 248, 0.5);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speaker-label::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--gemini-cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--gemini-cyan);
        }

        .speaking .speaker-label {
            color: var(--gemini-magenta);
            text-shadow: 0 0 8px rgba(224, 102, 255, 0.5);
        }
        .speaking .speaker-label::before {
            background-color: var(--gemini-magenta);
            box-shadow: 0 0 8px var(--gemini-magenta);
            animation: pulse-dot 0.6s ease-in-out infinite alternate;
        }

        .subtitle-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #e2e8f0;
            font-weight: 400;
            word-wrap: break-word;
        }

        /* 頂部切換提示 */
        .debug-panel {
            position: absolute;
            top: 15px;
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 11px;
            color: #718096;
            cursor: pointer;
            z-index: 999;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .debug-panel:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
        }

        /* 語音能量條圈 (反應式聲量環) */
        .audio-ring {
            position: absolute;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid transparent;
            z-index: 5;
            pointer-events: none;
            transition: transform 0.1s ease;
        }

        /* 動畫定義 */
        @keyframes breathe {
            0%, 100% {
                transform: scale(0.98);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.02);
                opacity: 1;
            }
        }

        @keyframes pulse-speaking {
            0% {
                filter: drop-shadow(0 0 35px rgba(224, 102, 255, 0.6))
                        drop-shadow(0 0 50px rgba(66, 133, 244, 0.3));
            }
            100% {
                filter: drop-shadow(0 0 55px rgba(224, 102, 255, 0.9))
                        drop-shadow(0 0 90px rgba(66, 133, 244, 0.6));
            }
        }

        @keyframes rotate-clockwise {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotate-counter {
            from { transform: rotate(360deg); }
            to { transform: rotate(0deg); }
        }

        @keyframes pulse-dot {
            from { transform: scale(0.8); opacity: 0.5; }
            to { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 頂部偵錯與模式切換區 (串流時不顯示或可點擊切換) -->
    <div class="debug-panel" id="mode-toggle">模式: JSON 輪詢偵測 (點擊切換語音觸發模式)</div>

    <div class="overlay-container" id="overlay-container">
        <!-- 粒子 Canvas -->
        <canvas id="particle-canvas"></canvas>

        <!-- 外圍科幻裝飾環 -->
        <div class="halo"></div>
        <div class="halo-inner"></div>

        <!-- 反應式聲量環 -->
        <div class="audio-ring" id="audio-ring"></div>

        <!-- Logo 區 -->
        <div class="logo-wrapper logo-breathing" id="logo-wrapper">
            <svg class="gemini-logo-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- 定義漸變色 -->
                <defs>
                    <radialGradient id="gemini-gradient" cx="40%" cy="40%" r="60%">
                        <stop offset="0%" stop-color="#c3ecff" />
                        <stop offset="35%" stop-color="#9bc5ff" />
                        <stop offset="70%" stop-color="#d4b2ff" />
                        <stop offset="100%" stop-color="#ff94e8" />
                    </radialGradient>
                </defs>

                <!-- Gemini 經典雙星星標向量圖 -->
                <!-- 大主星 -->
                <path d="M 100,20 Q 100,100 180,100 Q 100,100 100,180 Q 100,100 20,100 Q 100,100 100,20 Z" fill="url(#gemini-gradient)" />
                <!-- 小輔星 -->
                <path d="M 155,50 Q 155,90 195,90 Q 155,90 155,130 Q 155,90 115,90 Q 155,90 155,50 Z" fill="url(#gemini-gradient)" opacity="0.9" />
            </svg>
        </div>

        <!-- 聊天/字幕彈出視窗 -->
        <div class="subtitle-box" id="subtitle-box">
            <span class="speaker-label" id="speaker-label">Gemini Assistant</span>
            <p class="subtitle-text" id="subtitle-text">哈囉風子！今天我們要在這台 Windows 主機上實況什麼精彩的內容呢？本助理已經連線就緒囉！(〃∀〃)</p>
        </div>
    </div>

    <script>
        // DOM 元素獲取
        const container = document.getElementById('overlay-container');
        const logoWrapper = document.getElementById('logo-wrapper');
        const subtitleBox = document.getElementById('subtitle-box');
        const subtitleText = document.getElementById('subtitle-text');
        const modeToggle = document.getElementById('mode-toggle');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        // 參數設定
        let isSpeaking = false;
        let lastSpeakText = "";
        let checkInterval = 100; // JSON 輪詢間隔 (ms)
        let mode = "JSON"; // "JSON" 或 "AUDIO"
        let subtitleTimeout;

        // 畫布大小重置
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 粒子陣列
        const particles = [];

        // 粒子類別定義
        class Particle {
            constructor() {
                // 從 Logo 中央爆發
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 60;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 60;
                
                // 動態速度
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 2.5 + (isSpeaking ? 2 : 0.5);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - (isSpeaking ? 1.5 : 0.5); // 主要往上飄
                
                // 粒子大小與顏色
                this.size = Math.random() * (isSpeaking ? 7 : 4) + 1;
                this.color = this.getRandomGeminiColor();
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + (isSpeaking ? 0.008 : 0.02);
            }

            getRandomGeminiColor() {
                const colors = [
                    'rgba(138, 180, 248, ', // 藍
                    'rgba(161, 66, 244, ',  // 紫
                    'rgba(224, 102, 255, ', // 桃紅
                    'rgba(195, 236, 255, '  // 亮藍白
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color + this.alpha + ')';
                
                // 發光特效
                ctx.shadowBlur = this.size * 2.5;
                ctx.shadowColor = this.color + '1)';
                ctx.fill();
                ctx.restore();
            }
        }

        // 粒子循環處理
        function handleParticles() {
            // 每幀渲染粒子
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 空閒狀態偶爾飄粒子，說話狀態大量爆發
            const spawnRate = isSpeaking ? 0.8 : 0.15;
            if (Math.random() < spawnRate) {
                particles.push(new Particle());
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                // 銷毀透明粒子
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(handleParticles);
        }
        handleParticles();

        // --- 狀態更新控制器 ---
        function updateSpeechState(speaking, text = "") {
            if (speaking) {
                if (!isSpeaking) {
                    isSpeaking = true;
                    container.classList.add('speaking');
                    logoWrapper.classList.remove('logo-breathing');
                }
                
                // 如果文字有更新，更替字幕並顯示
                if (text && text !== lastSpeakText) {
                    lastSpeakText = text;
                    subtitleText.innerText = text;
                    subtitleBox.classList.add('show');
                    
                    // 清除之前的淡出計時器
                    clearTimeout(subtitleTimeout);
                }
            } else {
                if (isSpeaking) {
                    isSpeaking = false;
                    container.classList.remove('speaking');
                    logoWrapper.classList.add('logo-breathing');
                    
                    // 當結束說話時，設定 3 秒後自動隱藏字幕對話框
                    clearTimeout(subtitleTimeout);
                    subtitleTimeout = setTimeout(() => {
                        subtitleBox.classList.remove('show');
                    }, 4000);
                }
            }
        }

        // --- 模式 1：JSON 輪詢機制 ---
        async function pollStateFile() {
            if (mode !== "JSON") return;
            try {
                // 讀取相對路徑下的 speaking_state.json 狀態檔
                const response = await fetch('../player_profile/speaking_state.json', { cache: "no-store" });
                if (response.ok) {
                    const data = await response.json();
                    updateSpeechState(data.speaking, data.text);
                }
            } catch (error) {
                // 靜默捕捉，可能是因為尚未生成或本地跨域限制
                console.log("正在等待實況助理引擎寫入狀態檔...");
            }
        }

        // 啟動定時輪詢
        setInterval(pollStateFile, checkInterval);

        // --- 模式 2：真實麥克風/音訊監聽反應模式 (Audio Reactive Mode) ---
        // 點擊 debug panel 或雙擊 Logo 可切換，適用於直接接收系統音效，無須輪詢
        let audioCtx, analyser, microphone, dataArray;
        
        async function initAudioReactive() {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                
                microphone = audioCtx.createMediaStreamSource(stream);
                microphone.connect(analyser);
                
                detectAudioVolume();
                modeToggle.innerText = "模式: 麥克風音量感應反應";
                modeToggle.style.color = "var(--gemini-magenta)";
            } catch (err) {
                alert("無法取得音訊裝置權限！請確認是否允許麥克風存取。");
                mode = "JSON";
                modeToggle.innerText = "模式: JSON 輪詢偵測 (點擊切換語音觸發模式)";
                modeToggle.style.color = "#718096";
            }
        }

        function detectAudioVolume() {
            if (mode !== "AUDIO") return;
            analyser.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            
            // 平均振幅音量
            const average = sum / dataArray.length;
            
            // 當平均聲量高於閾值時，視為發言亮起
            if (average > 18) { 
                const scale = 1 + (average / 120);
                logoWrapper.style.transform = `scale(${Math.min(1.3, scale)}) rotate(${average / 15}deg)`;
                updateSpeechState(true, "🎤 正在聆聽/播放實況音訊中...");
            } else {
                logoWrapper.style.transform = '';
                updateSpeechState(false);
            }
            
            requestAnimationFrame(detectAudioVolume);
        }

        // 模式切換點擊事件
        modeToggle.addEventListener('click', () => {
            if (mode === "JSON") {
                mode = "AUDIO";
                initAudioReactive();
            } else {
                mode = "JSON";
                logoWrapper.style.transform = '';
                modeToggle.innerText = "模式: JSON 輪詢偵測 (點擊切換語音觸發模式)";
                modeToggle.style.color = "#718096";
            }
        });

        // 雙擊 Logo 觸發模擬說話 (展示與測試用！)
        logoWrapper.addEventListener('dblclick', () => {
            if (!isSpeaking) {
                updateSpeechState(true, "（測試模式）哈囉風子！雙擊我即可模擬測試語音亮起與粒子爆發特效！是不是超級閃亮耀眼！✨(〃∀〃)");
                setTimeout(() => {
                    updateSpeechState(false);
                }, 4000);
            }
        });

        // 點擊 Logo 也可以輕微晃動增添微交互感
        logoWrapper.addEventListener('click', () => {
            logoWrapper.style.transform = 'scale(0.9) rotate(-3deg)';
            setTimeout(() => {
                if(!isSpeaking) logoWrapper.style.transform = '';
            }, 150);
        });

    </script>
</body>
</html>
